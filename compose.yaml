services:
  # This service MUST have the name "kdc-kadmin" otherwise every kerberos client won't be able to talk with the KDC.
  # If you would like to change the name edit the file configureKerberosClient.sh and change the configurations
  # "kdc" and "admin_server" in the /etc/krb5.conf section.
  kdc-kadmin:
    build: ./kdc-kadmin
    env_file: kerberos.env
    environment:
      HOST_HOSTNAME: ${HOST_HOSTNAME}
      HOST_USER: ${HOST_USER}
    ports:
      - 88:88
      - 88:88/udp
      - 749:749
      - 749:749/udp
    volumes:
      # This is needed otherwise there won't be enough entropy to generate a new kerberos realm
      - /dev/urandom:/dev/random
      - ./keytabs:/keytabs

  kerberos-client:
    build: ./kerberos-client
    env_file: kerberos.env
    depends_on:
      - kdc-kadmin

  nfs:
    image: erichough/nfs-server
    hostname: nfs-server
    # environment:
    #   NFS_ENABLE_KERBEROS: 0
    cap_add:
      - SYS_ADMIN
    # privileged: true
    ports:
      - 2049:2049
      - 2049:2049/udp
      - 111:111
      - 111:111/udp
      - 32765:32765
      - 32765:32765/udp
      - 32767:32767
      - 32767:32767/udp
    volumes:
      # - type: bind
      #   source: ./keytabs/nfs-server.keytab
      #   target: /etc/krb5.keytab
      #   read_only: true
      # - type: bind
      #   source: ./krb5.conf
      #   target: /etc/krb5.conf
      #   read_only: true
      - type: bind
        source: exports
        target: /etc/exports
      - ./data:/data
    depends_on:
      - kdc-kadmin
    
  openldap:
    image: osixia/openldap
    hostname: panda
    ports:
      - 389:389
      - 636:636
    environment:
      LDAP_ORGANISATION: Example Inc           # Organization name
      LDAP_DOMAIN: example.local               # Domain name for LDAP
      LDAP_ADMIN_PASSWORD: password # Admin password for ldapadmin user
      LDAP_BASE_DN: dc=example,dc=local        # Base DN for LDAP entries
    volumes:
      - openldap-conf:/etc/openldap/slapd.d
      - openldap-data:/var/lib/openldap/openldap-data
      - openldap-backups:/var/lib/openldap/openldap-backups
      - type: bind
        source: ./keytabs/openldap-server.keytab
        target: /etc/krb5.keytab
        read_only: true
      - type: bind
        source: ./krb5.conf
        target: /etc/krb5.conf
        read_only: true

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    ports:
      - 6443:443
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: panda
    depends_on:
      - openldap


volumes:
  openldap-conf:
  openldap-data:
  openldap-backups:


# NOTE:
#  "env_file: kerberos.env" is optional.
#  In case no .env file is supplied, nor any environment variable is set, the following values will be used:
#   REALM=EXAMPLE.COM
#   SUPPORTED_ENCRYPTION_TYPES=aes256-cts-hmac-sha1-96:normal
#   KADMIN_PRINCIPAL=kadmin/admin
#   KADMIN_PASSWORD=MITiys4K5
